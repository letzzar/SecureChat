name: Build Server

on:
  push:
    # Branches only — release tags are handled by release.yml.
    branches: ['**']
    paths:
      - 'securechat-server/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'securechat-server/**'
      - '.github/workflows/server.yml'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # go-sqlite3 needs CGO, so we build natively on each OS instead of
    # cross-compiling (cross-CGO is painful).
    env:
      CGO_ENABLED: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            artifact: securechat-server-linux-amd64
            ext: ''
          - os: macos-latest
            name: macos-arm64
            artifact: securechat-server-macos-arm64
            ext: ''
          - os: windows-latest
            name: windows-amd64
            artifact: securechat-server-windows-amd64
            ext: '.exe'
    defaults:
      run:
        working-directory: securechat-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: securechat-server/go.mod
          cache-dependency-path: securechat-server/go.sum

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -v -o "${{ matrix.artifact }}${{ matrix.ext }}" ./main.go

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: securechat-server/${{ matrix.artifact }}${{ matrix.ext }}
          if-no-files-found: error
