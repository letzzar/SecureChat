name: securechat
description: Secure end-to-end encrypted messaging app.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Cryptography
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.0.0

  # Networking
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.0.0

  # UI
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  file_picker: ^6.1.1
  path_provider: ^2.1.3

  # Voice
  flutter_webrtc: ^0.9.47
  emoji_picker_flutter: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.11

dependency_overrides:
  # Pin to last version before objective_c native hooks were introduced (2.4.0+)
  path_provider_foundation: 2.3.2

flutter:
  uses-material-design: true
  assets:
    - assets/
